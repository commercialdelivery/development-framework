<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Development Framework Tool — Showcase</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--mid:#00261C;--ovo:#0A9828;--leaf:#16B639;--forest:#044D29;--energised:#38E44C;--off:#F9F6F3;--org:#E95D21;--yel:#E99921;--blu:#4F66DE}
body{font-family:'Figtree',system-ui,sans-serif;background:#f5f3ef;color:var(--mid);min-height:100vh}
.nav{background:var(--mid);padding:0 32px;display:flex;align-items:center;gap:32px;height:56px;position:sticky;top:0;z-index:100}
.nav-brand{color:#fff;font-size:15px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap}
.nav-tabs{display:flex;gap:2px;height:100%}
.nav-tab{padding:0 20px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.55);background:transparent;border:none;cursor:pointer;height:100%;border-bottom:2.5px solid transparent;transition:all 0.15s}
.nav-tab:hover{color:rgba(255,255,255,0.8)}
.nav-tab.active{color:#fff;border-bottom-color:var(--energised)}
.page{max-width:1100px;margin:0 auto;padding:24px 32px 60px}
.section{display:none}.section.visible{display:block}
.person-bar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.person-btn{height:38px;padding:0 20px;border-radius:8px;border:2px solid #e0ddd6;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--mid);transition:all 0.12s;display:flex;align-items:center;gap:8px}
.person-btn:hover{border-color:#ccc;transform:translateY(-1px)}
.person-btn .lvl{font-size:10px;font-weight:700;background:var(--off);padding:1px 6px;border-radius:4px;color:#888}
.person-btn.active{color:#fff;border-color:transparent}
.person-btn.active .lvl{background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.85)}

.radar-row{display:flex;gap:28px;align-items:flex-start;margin-bottom:28px}
.radar-col{flex:0 0 460px}
.radar-side{flex:1;min-width:0}
canvas{display:block}
.avg-block{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #eae8e3;margin-bottom:16px}
.avg-block h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#999;margin-bottom:12px}
.avg-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avg-label{font-size:12px;width:60px;color:#666}
.avg-track{flex:1;height:7px;background:#f0eeea;border-radius:4px;overflow:hidden}
.avg-fill{height:100%;border-radius:4px;transition:width 0.4s}
.avg-val{font-size:12px;font-weight:700;width:32px;text-align:right}
.avg-note{font-size:11px;color:#aaa;margin-top:6px}
.legend-strip{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap}
.legend-i{display:flex;align-items:center;gap:6px;font-size:11px;color:#888}
.legend-dot{width:10px;height:3px;border-radius:2px}
.legend-dash{width:16px;border-top:2px dashed;height:0}

/* FW CARDS */
.fw-section h3{font-size:13px;font-weight:700;color:var(--mid);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--energised);display:inline-block}
.fw-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fw-cat-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#bbb;margin:20px 0 10px;grid-column:1/-1}
.fw-card{background:#fff;border-radius:10px;padding:16px 18px;border:1px solid #eae8e3;transition:border-color 0.15s}
.fw-dim-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fw-dim-name{font-size:13px;font-weight:700;color:var(--mid)}
.score-selector{display:flex;gap:4px}
.score-opt{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid #e0ddd6;background:#fff;color:#999;transition:all 0.12s;font-family:inherit}
.score-opt:hover{border-color:#ccc}
.score-opt.sel-0{border-color:#e0ddd6;background:#fafaf7;color:#bbb}
.score-opt.sel-1{border-color:var(--org);background:#fff0eb;color:#8a3210}
.score-opt.sel-2{border-color:var(--ovo);background:#e8f8ec;color:#044d29}
.score-opt.sel-3{border-color:var(--blu);background:#e8efff;color:#1a3ba8}
.fw-level{margin-bottom:6px;padding:6px 8px;border-radius:6px;border-left:3px solid #eee;background:#fafaf7}
.fw-level.active{background:#fff}
.fw-level.l-active{border-left-color:var(--org);background:#fffaf7}
.fw-level.p-active{border-left-color:var(--ovo);background:#f4fbf5}
.fw-level.m-active{border-left-color:var(--blu);background:#f5f6ff}
.fw-level-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;color:#bbb}
.fw-level.l-active .fw-level-label{color:var(--org)}
.fw-level.p-active .fw-level-label{color:var(--ovo)}
.fw-level.m-active .fw-level-label{color:var(--blu)}
.fw-level p{font-size:11.5px;color:#888;line-height:1.5}
.fw-level.l-active p,.fw-level.p-active p,.fw-level.m-active p{color:#555}

/* HEATMAP */
.hm-wrap{overflow-x:auto}
.hm-table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #eae8e3}
.hm-table th{font-size:11px;font-weight:700;padding:12px 10px;text-align:center;color:#888;text-transform:uppercase;letter-spacing:0.5px;background:#fafaf7;border-bottom:1px solid #eae8e3;position:sticky;top:0}
.hm-table th:first-child{text-align:left;padding-left:16px;min-width:180px}
.hm-table td{padding:8px 10px;text-align:center;font-size:12px;font-weight:600;border-bottom:1px solid #f5f3ef}
.hm-table td:first-child{text-align:left;padding-left:16px;font-weight:500;color:var(--mid)}
.hm-table tr:last-child td{border-bottom:none}
.hm-cell{width:36px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.hm-1{background:#fff0eb;color:#8a3210}.hm-2{background:#e8f8ec;color:#044d29}.hm-3{background:#e8efff;color:#1a3ba8}.hm-0{background:#f8f7f4;color:#ccc}
.hm-cat-row td{background:#fafaf7;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#bbb;padding:6px 16px;border-bottom:1px solid #eae8e3}
.hm-avg td{background:#f9f7f2;font-weight:700;border-top:2px solid #eae8e3}
.hm-fw{margin-top:28px}
.hm-fw h3{font-size:13px;font-weight:700;color:var(--mid);margin-bottom:14px;padding-bottom:6px;border-bottom:2px solid var(--energised);display:inline-block}
.fw-full-grid{display:grid;grid-template-columns:1fr;gap:6px}
.fw-full-row{display:grid;grid-template-columns:150px 1fr 1fr 1fr;gap:10px;padding:8px 12px;border-radius:8px;background:#fff;border:1px solid #eae8e3}
.fw-full-dim{font-size:11px;font-weight:700;color:var(--mid);display:flex;align-items:center}
.fw-full-desc{font-size:10.5px;color:#666;line-height:1.45}
.fw-full-desc strong{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:2px}
.fw-full-desc strong.l-label{color:var(--org)}
.fw-full-desc strong.p-label{color:var(--ovo)}
.fw-full-desc strong.m-label{color:var(--blu)}

/* REPORT */
.report-person-header{background:var(--mid);color:#fff;border-radius:10px;padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.rph-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.rph-info h3{font-size:18px;font-weight:700}
.rph-info p{font-size:12px;opacity:0.6;margin-top:2px}
.rph-stats{display:flex;gap:16px;margin-left:auto}
.rph-stat{text-align:center}
.rph-stat-val{font-size:22px;font-weight:900}
.rph-stat-label{font-size:10px;opacity:0.5;text-transform:uppercase;letter-spacing:0.5px}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.report-card{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #eae8e3}
.report-card h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#999;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.report-card h4 .icon{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0}
.rc-full{grid-column:1/-1}
.rc-item{padding:10px 12px;border-radius:8px;background:#fafaf7;margin-bottom:8px;border-left:3px solid #ddd}
.rc-item.priority{border-left-color:var(--org);background:#fff9f5}
.rc-item.building{border-left-color:var(--ovo);background:#f4fbf5}
.rc-item.strength{border-left-color:var(--blu);background:#f5f6ff}
.rc-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rc-item-name{font-size:13px;font-weight:700;color:var(--mid)}
.rc-item-type{font-size:10px;color:#aaa}
.rc-item-text{font-size:11.5px;color:#666;line-height:1.55;margin-bottom:4px}
.rc-item-action{padding-top:6px;border-top:1px dashed #e5e3dd;font-size:11px;color:#888}
.rc-item-action strong{color:var(--mid)}
.context-box{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #eae8e3;margin-bottom:16px}
.context-box h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#999;margin-bottom:8px}
.context-box p{font-size:12px;color:#555;line-height:1.6}
.ctx-flag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-top:6px;margin-right:4px}
.ctx-risk{background:#fff0eb;color:#8a3210}
.ctx-strength{background:#e8efff;color:#1a3ba8}
.readiness-track{height:10px;background:#f0eeea;border-radius:5px;overflow:hidden;margin-top:4px}
.readiness-fill{height:100%;border-radius:5px}
.readiness-markers{display:flex;justify-content:space-between;font-size:10px;color:#bbb;margin-top:3px}
.print-bar{display:flex;gap:10px;margin-bottom:16px}
.print-btn{padding:8px 18px;border-radius:8px;border:1.5px solid #e0ddd6;background:#fff;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--mid);display:flex;align-items:center;gap:6px}
.print-btn:hover{background:var(--off)}
.cmp-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f3ef;font-size:12px}
.cmp-row:last-child{border-bottom:none}
@media print{.nav,.person-bar,.nav-tabs,.print-bar,.score-selector{display:none!important}.section{display:block!important;page-break-before:always}.page{padding:0}}
@media(max-width:800px){.radar-row{flex-direction:column}.radar-col{flex:auto;width:100%}.report-grid{grid-template-columns:1fr}.fw-grid{grid-template-columns:1fr}.fw-full-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">Development Framework — Showcase</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="go('radar')">Radar & Framework</button>
    <button class="nav-tab" onclick="go('team')">Team Heatmap</button>
    <button class="nav-tab" onclick="go('report')">Development Report</button>
  </div>
</nav>
<div style="background:#E8F8EC;padding:10px 32px;font-size:12px;color:#044D29;font-weight:600;text-align:center;font-family:Figtree,sans-serif">Showcase version with example data. Replace Person A–E with your team and adjust scores to use live.</div>
<div class="page">
  <div class="section visible" id="sec-radar">
    <div class="person-bar" id="pills-radar"></div>
    <div class="radar-row">
      <div class="radar-col"><canvas id="rc" width="460" height="460"></canvas><div class="legend-strip" id="leg"></div></div>
      <div class="radar-side"><div class="avg-block" id="avg-block"></div></div>
    </div>
    <div class="fw-section" id="fw-section"></div>
  </div>
  <div class="section" id="sec-team">
    <div class="hm-wrap" id="hm-wrap"></div>
    <div class="hm-fw" id="hm-fw"></div>
  </div>
  <div class="section" id="sec-report">
    <div class="person-bar" id="pills-report"></div>
    <div class="print-bar"><button class="print-btn" onclick="window.print()">&#11015; Save as PDF</button></div>
    <div id="report-out"></div>
  </div>
</div>
<script>
const SKILLS=["Communication","Execution","Prioritisation","Analysis","Leadership / Collaboration","Domain Knowledge"];
const VALUES=["Do What's Right","Find a Better Way","Build Something Great","Be Customer Obsessed","Keep it Simple"];
const ALL=[...SKILLS,...VALUES];

const FW={
  L7:{
    "Communication":{l:"Still developing confidence communicating beyond their immediate team. May need prompting to provide updates or flag issues to wider stakeholders.",p:"Communicates clearly and concisely within their team and with immediate project stakeholders.",m:"Adapts style to audience. Builds a coherent picture of their work that others can act on."},
    "Execution":{l:"Needs regular guidance to complete tasks. May struggle to manage blockers independently or keep delivery on track without support.",p:"Delivers defined tasks and workstreams on time and to a high standard with limited direction.",m:"Proactively manages their own blockers. Raises risks early and keeps work moving without being chased."},
    "Prioritisation":{l:"Tends to work through tasks sequentially rather than prioritising by impact. Needs support to manage competing demands.",p:"Manages their own time and workload. Flags conflicts and dependencies to their manager.",m:"Starts to make independent prioritisation calls within their workstream. Communicates trade-offs clearly."},
    "Analysis":{l:"Produces basic analysis but may lack structure or miss key insights. Findings can be unclear or hard for others to act on.",p:"Produces clear, structured analysis that informs decisions. Presents findings in an accessible way.",m:"Drives decisions with their analysis. Takes ownership of data quality and reliability within their area."},
    "Leadership / Collaboration":{l:"Works within the team but may be passive. Shares information when asked rather than proactively. Limited cross-team engagement.",p:"Works well within the team. Shares information proactively and supports colleagues.",m:"Actively raises the quality of work around them. Spots gaps others miss and fills them without being asked."},
    "Domain Knowledge":{l:"Limited understanding of their function or OVO's commercial model. Still learning the basics of how things work and why.",p:"Developing working knowledge of their function. Understands the basics of how OVO's commercial model works.",m:"Demonstrates solid functional understanding. Can explain what they do, why it matters, and how it connects to commercial outcomes."},
    "Do What's Right":{l:"Generally positive but may avoid difficult situations or stay quiet when things don't feel right.",p:"Remains positive and approachable. Acts with integrity and treats colleagues with respect, even when things are difficult.",m:"Champions doing the right thing, especially when it's not the easy path. Speaks up when something doesn't feel right."},
    "Find a Better Way":{l:"Follows established processes without questioning whether they could be improved. Reactive rather than proactive.",p:"Spots opportunities to improve how they personally work. Brings ideas to make things Simpler, Cheaper or Greener.",m:"Proactively suggests improvements beyond their own workstream. Inspires peers to challenge the status quo."},
    "Build Something Great":{l:"Delivers work that meets minimum requirements but may lack thoroughness or attention to quality.",p:"Delivers work to a consistently high standard \u2014 thorough, not just fast.",m:"Creates a safe space for ideas. Builds sustainable solutions and encourages others to do the same."},
    "Be Customer Obsessed":{l:"Limited awareness of how their work impacts customers. Decisions are made without customer context.",p:"Keeps the customer in view when making decisions. Uses insight and feedback to shape their work.",m:"Actively shares customer stories to inform how the team works. Connects their output to customer outcomes."},
    "Keep it Simple":{l:"May overcomplicate their work or struggle to identify what matters most. Doesn't always flag unnecessary complexity.",p:"Keeps their own work focused and avoids unnecessary complexity.",m:"Challenges themselves and peers to cut through noise and focus on what matters most."},
  },
  L6:{
    "Communication":{l:"Communicates adequately but tends toward functional updates rather than narratives. May struggle to land messages with cross-functional audiences.",p:"Clear and audience-aware. Adapts style across levels. Builds coherent narratives to land outcomes with peers and cross-functional stakeholders.",m:"A confident storyteller. Shapes narratives that create momentum and land with senior leadership. Represents the team at senior forums."},
    "Execution":{l:"Delivers individual projects but struggles under volume. Quality can dip when managing multiple workstreams simultaneously.",p:"Owns and delivers multiple projects simultaneously with clear process and high-quality outputs.",m:"Creates momentum across competing priorities. Delivers consistently at pace, even when navigating ambiguity or unexpected challenges."},
    "Prioritisation":{l:"Manages their own workload but doesn't always manage stakeholder expectations proactively. May get pulled into low-value work.",p:"Manages multiple priorities and stakeholders with strong expectation management. Flags conflicts early.",m:"Helps focus team effort on what matters most. Makes clear prioritisation calls and communicates the rationale."},
    "Analysis":{l:"Produces analysis but it may lack the depth or structure to drive decisions at pace. Can be slow to translate data into actionable recommendations.",p:"Drives decision-making supported by robust analysis and insight. Accountable for quality and reliability of their work.",m:"Distils complexity into clear, actionable recommendations. Creates the conditions for others to produce good analysis."},
    "Leadership / Collaboration":{l:"Supportive of teammates but not yet actively coaching or investing in others' development. Leadership is informal and inconsistent.",p:"Coaches and supports those around them. Actively invests in others' growth and delivery quality.",m:"Actively improves team culture through meaningful feedback, clear direction, and visible investment in others' development."},
    "Domain Knowledge":{l:"Has a basic understanding of their function but gaps remain. Not yet able to advise others or connect work to broader commercial context independently.",p:"Strong functional expertise in their specialism. Understands how their work connects to other Commercial Change functions.",m:"The go-to voice in their area. Advises upward on feasibility, risk and commercial impact. Proactively cross-skills others."},
    "Do What's Right":{l:"Generally acts with integrity but may avoid confrontation or difficult conversations. Doesn't always champion the right course when it's uncomfortable.",p:"Remains positive and approachable. Acts with integrity and treats colleagues and customers with respect, even under pressure.",m:"Remains resilient under pressure. Acts with empathy and actively champions doing the right thing \u2014 especially when it's not the easy path."},
    "Find a Better Way":{l:"Follows processes well but doesn't actively seek to improve them. Tends to accept the status quo rather than challenging it.",p:"Actively seeks opportunities to improve how the team works. Challenges the status quo to make things Simpler, Cheaper or Greener.",m:"Inspires peers to challenge assumptions. Develops ideas for improvement and follows through on them."},
    "Build Something Great":{l:"Delivers to standard but may default to quick fixes. Doesn't always invest in building sustainable, scalable solutions.",p:"Creates a safe space for ideas. Delivers to a consistently high standard \u2014 thorough, not just fast.",m:"Creates momentum and encourages creativity. Builds sustainable solutions rather than quick fixes and helps others do the same."},
    "Be Customer Obsessed":{l:"Aware of customers at a surface level but doesn't consistently use customer insight to shape decisions or team direction.",p:"Keeps the customer in view when making decisions. Uses insight and feedback to shape their work and their team's work.",m:"Develops ideas rooted in customer insight. Actively connects customer outcomes to commercial decisions."},
    "Keep it Simple":{l:"Work can be unnecessarily complex. Doesn't always flag when things are getting overcomplicated or challenge unnecessary processes.",p:"Keeps their work focused. Avoids unnecessary complexity and flags when things are getting too complicated.",m:"Challenges themselves and others to focus on what matters most. Helps the team cut through noise and work with greater speed and clarity."},
  },
  L5:{
    "Communication":{l:"Communicates well at team level but hasn't yet developed the confidence or skill to land narratives consistently at senior leadership level.",p:"Confident storyteller \u2014 communicates with clarity and empathy across all levels of the organisation.",m:"Communicates with purpose and precision to influence senior leadership. Shapes narratives that land, create momentum and drive alignment."},
    "Execution":{l:"Delivers projects reliably but can get pulled into the detail. Doesn't yet create momentum across a portfolio or set the quality standard for others.",p:"Leads multiple projects simultaneously with clear process and consistently high-quality outputs.",m:"Creates momentum across a complex portfolio of priorities. Delivers high quality at pace, even when navigating ambiguity or unexpected challenges."},
    "Prioritisation":{l:"Manages their own priorities well but doesn't yet hold the holistic view across team, function and business context needed to make strategic sequencing calls.",p:"Manages multiple priorities and stakeholders well. Sets clear expectations, keeps things on track, and makes sequencing calls with confidence.",m:"Demonstrates a holistic view of priorities \u2014 balancing team, function and OVO strategic context to ensure the right focus across the organisation."},
    "Analysis":{l:"Strong analytically but doesn't yet consistently translate insight into recommendations that shape senior-level decisions.",p:"Drives decision-making using relevant analysis and insight. Distils complexity into clear, actionable recommendations.",m:"Solves complex business problems using a structured, analysis-led approach. Creates the conditions for others to do the same."},
    "Leadership / Collaboration":{l:"Leads within their immediate area but doesn't yet shape thinking across the team or actively build capability and culture at scale.",p:"Leads thinking amongst peers. Actively supports the growth and development of their team.",m:"Builds a high-performance culture \u2014 clears the fog, creates alignment, and develops the next generation of talent within the team."},
    "Domain Knowledge":{l:"Good functional knowledge but not yet recognised by the wider business as the domain authority. Gaps in breadth or depth remain.",p:"Deep functional expertise across their area. Understood by the wider business as the authority on their domain.",m:"Advises senior stakeholders on feasibility, risk and commercial impact. Actively reduces single points of failure by building knowledge across the team."},
    "Do What's Right":{l:"Acts with integrity but may avoid the most difficult decisions or defer them upward rather than owning the call.",p:"Remains resilient under pressure. Acts with empathy and consistently champions doing the right thing for customers and colleagues.",m:"Makes difficult decisions with courage, empathy and positivity. Models the standard of behaviour they expect to see across their team."},
    "Find a Better Way":{l:"Identifies areas for improvement but doesn't always drive them through to completion or think beyond their immediate function.",p:"Actively seeks opportunities to improve performance. Challenges the status quo with a view to making things Simpler, Cheaper and Greener.",m:"Leads thinking on future risks and opportunities. Shapes how the team builds resilience and drives continuous improvement."},
    "Build Something Great":{l:"Delivers good work but doesn't yet set the standard for others or build the environment that encourages exceptional thinking.",p:"Creates momentum and a safe space for ideas. Is thorough in developing sustainable solutions \u2014 not just quick fixes.",m:"Energises others and encourages diversity of thought. Is rigorous in approach \u2014 settles for exceptional, not just acceptable."},
    "Be Customer Obsessed":{l:"Customer-aware but doesn't yet proactively connect customer truth to team-level or commercial decisions.",p:"Develops ideas rooted in customer insight. Keeps the customer central to how the team delivers.",m:"Builds a holistic understanding of customers and market dynamics. Connects customer truth to commercial outcomes and drives the team forward."},
    "Keep it Simple":{l:"Manages complexity in their own work but doesn't yet actively simplify things for others or clear the fog at senior level.",p:"Challenges themselves and others to focus on what matters most. Reduces noise and drives clarity in their area.",m:"Clears the fog for senior leaders and across teams. Makes complexity digestible and enables confident decision-making at pace."},
  }
};

const PEOPLE={
  "Person A":{level:"L6",target:"L5",color:"#0A9828",fn:"Function 1",role:"Manager",scores:[2,3,2,2,1,2,2,2,3,2,2],context:"Example team member at L6 with a mix of scores across skills and values.",devFocus:"Development focus areas appear here based on the individual's role and progression goals.",risks:[],strengths:[]},

  "Person C":{level:"L7",target:"L6",color:"#E95D21",fn:"Function 3",role:"Analyst",scores:[2,2,1,2,2,3,3,2,2,2,2],context:"Example team member at L7 showing strong domain knowledge with room to grow on prioritisation.",devFocus:"Development focus areas appear here based on the individual's role and progression goals.",risks:[],strengths:[]},
  "Person D":{level:"L6",target:"L5",color:"#E99921",fn:"Function 1",role:"Manager",scores:[2,1,2,2,2,1,2,2,2,3,2],context:"Example team member at L6 with development areas in execution and domain knowledge.",devFocus:"Development focus areas appear here based on the individual's role and progression goals.",risks:[],strengths:[]},
  "Person E":{level:"L6",target:"L5",color:"#16B639",fn:"Function 2",role:"Manager",scores:[1,2,3,3,2,3,2,2,2,2,2],context:"Example team member at L6 with deep analytical strength and domain expertise.",devFocus:"Development focus areas appear here based on the individual's role and progression goals.",risks:[],strengths:[]},
};

const SL={0:"\u2014",1:"Learning",2:"Practicing",3:"Mastering"};
let cur="Person A";

function go(tab){
  document.querySelectorAll(".nav-tab").forEach((t,i)=>t.classList.toggle("active",["radar","team","report"][i]===tab));
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("visible"));
  document.getElementById("sec-"+tab).classList.add("visible");
  if(tab==="radar"){drawRadar();buildFW();}
  if(tab==="team"){buildHeatmap();buildFullFW();}
  if(tab==="report")buildReport();
}

function buildPills(id){
  const el=document.getElementById(id);el.innerHTML="";
  Object.keys(PEOPLE).forEach(name=>{
    const p=PEOPLE[name];const btn=document.createElement("button");
    btn.className="person-btn"+(name===cur?" active":"");btn.dataset.name=name;
    btn.innerHTML=name+' <span class="lvl">'+p.level+"</span>";
    if(name===cur){btn.style.background=p.color;btn.style.borderColor=p.color;btn.style.color="#fff"}
    btn.onclick=()=>{cur=name;refreshAll()};el.appendChild(btn);
  });
}

function refreshAll(){
  ["pills-radar","pills-report"].forEach(id=>{
    document.querySelectorAll("#"+id+" .person-btn").forEach(b=>{
      const a=b.dataset.name===cur;b.classList.toggle("active",a);
      b.style.background=a?PEOPLE[b.dataset.name].color:"";b.style.borderColor=a?PEOPLE[b.dataset.name].color:"";b.style.color=a?"#fff":"";
    });
  });
  drawRadar();buildAverages();buildFW();buildReport();
}

function setScore(dimIdx,val){
  const p=PEOPLE[cur];
  p.scores[dimIdx]=p.scores[dimIdx]===val?0:val;
  drawRadar();buildAverages();buildFW();
}

function drawRadar(){
  const canvas=document.getElementById("rc");const dpr=window.devicePixelRatio||1;const size=460;
  canvas.width=size*dpr;canvas.height=size*dpr;canvas.style.width=size+"px";canvas.style.height=size+"px";
  const ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  const cx=size/2,cy=size/2+6,R=size*0.30,n=ALL.length,max=3;ctx.clearRect(0,0,size,size);
  const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
  const pt=(i,r)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];
  function poly(scores,col,alpha,lw,dash=[]){
    ctx.beginPath();ctx.setLineDash(dash);
    scores.forEach((s,i)=>{const[x,y]=pt(i,(Math.max(0,s)/max)*R);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
    ctx.closePath();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();
    const rgb=hexRgb(col);ctx.fillStyle="rgba("+rgb+","+alpha+")";ctx.fill();ctx.setLineDash([]);
  }
  [1,2,3].forEach(lv=>{
    ctx.beginPath();for(let i=0;i<n;i++){const[x,y]=pt(i,(lv/max)*R);i?ctx.lineTo(x,y):ctx.moveTo(x,y)}
    ctx.closePath();ctx.strokeStyle=lv===3?"rgba(0,38,28,0.15)":"rgba(0,38,28,0.06)";ctx.lineWidth=lv===3?1.2:0.7;ctx.stroke();
    const la=ang(-0.5),lr=(lv/max)*R;ctx.fillStyle="rgba(0,38,28,0.28)";ctx.font="600 9px Figtree,sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillText(lv+" "+SL[lv],cx+lr*Math.cos(la)-4,cy+lr*Math.sin(la));
  });
  for(let i=0;i<n;i++){const[x,y]=pt(i,R);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.strokeStyle="rgba(0,38,28,0.07)";ctx.lineWidth=0.7;ctx.stroke();}
  poly(Array(n).fill(3),"#00261C",0.02,1.2,[5,4]);poly(Array(n).fill(2),"#0A9828",0.04,1.2,[4,3]);poly(Array(n).fill(1),"#E95D21",0.03,1,[3,3]);
  const p=PEOPLE[cur];
  if(p.scores.some(s=>s>0)){
    // fill polygon in person colour
    ctx.beginPath();p.scores.forEach((s,i)=>{const[x,y]=pt(i,(Math.max(0,s)/max)*R);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.closePath();const rgb=hexRgb(p.color);ctx.fillStyle="rgba("+rgb+",0.18)";ctx.fill();
    // draw segments with score-aware colours
    const segCol=(s1,s2)=>{if(s1===1||s2===1)return"#E95D21";if(s1===3||s2===3)return"#4F66DE";return p.color};
    for(let i=0;i<n;i++){const j=(i+1)%n;const s1=p.scores[i],s2=p.scores[j];if(!s1&&!s2)continue;const[x1,y1]=pt(i,(Math.max(0,s1)/max)*R);const[x2,y2]=pt(j,(Math.max(0,s2)/max)*R);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=segCol(s1,s2);ctx.lineWidth=2.5;ctx.stroke();}
    // dots coloured by score
    p.scores.forEach((s,i)=>{if(!s)return;const[x,y]=pt(i,(s/max)*R);const dc=s===1?"#E95D21":s===3?"#4F66DE":p.color;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();});
  }else{ctx.fillStyle="rgba(0,38,28,0.22)";ctx.font="500 12px Figtree";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Score dimensions below to build the chart",cx,cy)}
  const lR=R+30;
  for(let i=0;i<n;i++){
    const[lx,ly]=pt(i,lR);const cos=Math.cos(ang(i)),sin=Math.sin(ang(i));
    ctx.textAlign=Math.abs(cos)<0.18?"center":cos>0?"left":"right";ctx.textBaseline=sin<-0.3?"bottom":sin>0.3?"top":"middle";
    ctx.font=(p.scores[i]===1?"600":"500")+" 10.5px Figtree";
    ctx.fillStyle=p.scores[i]===1?"#E95D21":p.scores[i]===3?"#1a3ba8":i<SKILLS.length?"#00261C":"#666";
    const short=ALL[i].replace("Leadership / Collaboration","Leadership").replace("Be Customer Obsessed","Customer Obsessed").replace("Build Something Great","Build Great").replace("Domain Knowledge","Domain");
    ctx.fillText(short,lx,ly);
  }
  document.getElementById("leg").innerHTML='<div class="legend-i"><div class="legend-dot" style="background:'+p.color+'"></div>'+cur+'</div><div class="legend-i"><div class="legend-dash" style="border-color:#E95D21"></div>Learning (1)</div><div class="legend-i"><div class="legend-dash" style="border-color:#0A9828"></div>Practicing (2)</div><div class="legend-i"><div class="legend-dash" style="border-color:#00261C"></div>Mastering (3)</div>';
  buildAverages();
}

function buildAverages(){
  const p=PEOPLE[cur];const avg=arr=>{const f=arr.filter(s=>s>0);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0};
  const sk=avg(p.scores.slice(0,6)),vl=avg(p.scores.slice(6)),ov=avg(p.scores);
  function bar(label,val){return'<div class="avg-row"><div class="avg-label">'+label+'</div><div class="avg-track"><div class="avg-fill" style="width:'+(val/3*100)+'%;background:'+p.color+'"></div></div><div class="avg-val">'+(val?val.toFixed(1):"\u2014")+'</div></div>';}
  document.getElementById("avg-block").innerHTML='<h3>Averages \u2014 '+cur+' ('+p.level+')</h3>'+bar("Skills",sk)+bar("Values",vl)+bar("Overall",ov)+'<div class="avg-note">1 = Learning \u00b7 2 = Practicing \u00b7 3 = Mastering<br>Target for '+p.level+': 2.0 (Practicing) \u00b7 Target for '+p.target+': 3.0 (Mastering)</div>';
}

function buildFW(){
  const p=PEOPLE[cur],fw=FW[p.level],levelName=p.level==="L7"?"Analyst":p.level==="L6"?"Manager":"Senior Manager";
  let html='<h3>Framework \u2014 '+p.level+' ('+levelName+')</h3><p style="font-size:12px;color:#888;margin:-8px 0 16px">Click a score to rate '+cur+'. Click again to clear.</p><div class="fw-grid"><div class="fw-cat-label">Skills</div>';
  SKILLS.forEach((dim,i)=>{html+=makeCard(dim,i,p,fw)});
  html+='<div class="fw-cat-label">Values</div>';
  VALUES.forEach((dim,vi)=>{html+=makeCard(dim,SKILLS.length+vi,p,fw)});
  html+='</div>';
  document.getElementById("fw-section").innerHTML=html;
}

function makeCard(dim,idx,p,fw){
  const s=p.scores[idx],f=fw[dim];
  const lc=s===1?" l-active":"",pc=s===2?" p-active":"",mc=s===3?" m-active":"";
  return '<div class="fw-card"><div class="fw-dim-row"><div class="fw-dim-name">'+dim+'</div><div class="score-selector"><button class="score-opt'+(s===1?" sel-1":"")+'" onclick="setScore('+idx+',1)">1 Learning</button><button class="score-opt'+(s===2?" sel-2":"")+'" onclick="setScore('+idx+',2)">2 Practicing</button><button class="score-opt'+(s===3?" sel-3":"")+'" onclick="setScore('+idx+',3)">3 Mastering</button></div></div><div class="fw-level'+lc+'"><div class="fw-level-label">Learning \u2014 developing capability</div><p>'+f.l+'</p></div><div class="fw-level'+pc+'"><div class="fw-level-label">Practicing \u2014 meeting expectations</div><p>'+f.p+'</p></div><div class="fw-level'+mc+'"><div class="fw-level-label">Mastering \u2014 exceeding expectations</div><p>'+f.m+'</p></div></div>';
}

function buildHeatmap(){
  const names=Object.keys(PEOPLE);
  let html='<table class="hm-table"><thead><tr><th>Dimension</th>';
  names.forEach(n=>html+='<th style="color:'+PEOPLE[n].color+'">'+n+'<br><span style="font-weight:500;opacity:0.6">'+PEOPLE[n].level+'</span></th>');
  html+='<th>Team Avg</th></tr></thead><tbody><tr class="hm-cat-row"><td colspan="'+(names.length+2)+'">Skills</td></tr>';
  SKILLS.forEach((dim,di)=>{html+='<tr><td>'+dim+'</td>';let sum=0,cnt=0;names.forEach(n=>{const s=PEOPLE[n].scores[di];sum+=s;if(s)cnt++;html+='<td><span class="hm-cell hm-'+s+'">'+(s||"\u2014")+'</span></td>'});const avg=cnt?(sum/cnt):0;html+='<td style="font-weight:700;color:#666">'+(avg?avg.toFixed(1):"\u2014")+'</td></tr>'});
  html+='<tr class="hm-cat-row"><td colspan="'+(names.length+2)+'">Values</td></tr>';
  VALUES.forEach((dim,vi)=>{const di=SKILLS.length+vi;html+='<tr><td>'+dim+'</td>';let sum=0,cnt=0;names.forEach(n=>{const s=PEOPLE[n].scores[di];sum+=s;if(s)cnt++;html+='<td><span class="hm-cell hm-'+s+'">'+(s||"\u2014")+'</span></td>'});const avg=cnt?(sum/cnt):0;html+='<td style="font-weight:700;color:#666">'+(avg?avg.toFixed(1):"\u2014")+'</td></tr>'});
  html+='<tr class="hm-avg"><td>Overall Average</td>';
  names.forEach(n=>{const sc=PEOPLE[n].scores.filter(s=>s>0);const av=sc.length?sc.reduce((a,b)=>a+b,0)/sc.length:0;html+='<td style="color:'+PEOPLE[n].color+'">'+(av?av.toFixed(1):"\u2014")+'</td>'});
  const allSc=names.flatMap(n=>PEOPLE[n].scores).filter(s=>s>0);const teamAvg=allSc.length?allSc.reduce((a,b)=>a+b,0)/allSc.length:0;
  html+='<td>'+(teamAvg?teamAvg.toFixed(1):"\u2014")+'</td></tr></tbody></table>';
  document.getElementById("hm-wrap").innerHTML=html;
}

function buildFullFW(){
  let html='<h3>Full Framework Reference</h3>';
  ["L7","L6","L5"].forEach(lv=>{
    const label=lv==="L7"?"L7 \u2014 Analyst":lv==="L6"?"L6 \u2014 Manager":"L5 \u2014 Senior Manager";
    html+='<div style="margin-top:16px;font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.6px">'+label+'</div><div class="fw-full-grid" style="margin-top:8px">';
    ALL.forEach(dim=>{const f=FW[lv][dim];
      html+='<div class="fw-full-row"><div class="fw-full-dim">'+dim+'</div><div class="fw-full-desc"><strong class="l-label">Learning</strong>'+f.l+'</div><div class="fw-full-desc"><strong class="p-label">Practicing</strong>'+f.p+'</div><div class="fw-full-desc"><strong class="m-label">Mastering</strong>'+f.m+'</div></div>';
    });html+='</div>';
  });
  document.getElementById("hm-fw").innerHTML=html;
}

function buildReport(){
  const el=document.getElementById("report-out");el.innerHTML="";
  const p=PEOPLE[cur],fw=FW[p.level],fwN=FW[p.target];
  const scored=p.scores.filter(s=>s>0);const avg=scored.length?scored.reduce((a,b)=>a+b,0)/scored.length:0;
  const skAvg=(()=>{const f=p.scores.slice(0,6).filter(s=>s>0);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0})();
  const vlAvg=(()=>{const f=p.scores.slice(6).filter(s=>s>0);return f.length?f.reduce((a,b)=>a+b,0)/f.length:0})();
  const learning=ALL.map((d,i)=>({dim:d,s:p.scores[i],i:i})).filter(x=>x.s===1);
  const practicing=ALL.map((d,i)=>({dim:d,s:p.scores[i],i:i})).filter(x=>x.s===2);
  const mastering=ALL.map((d,i)=>({dim:d,s:p.scores[i],i:i})).filter(x=>x.s===3);
  const teamAvgs=ALL.map((_,i)=>{const vals=Object.values(PEOPLE).map(pp=>pp.scores[i]).filter(s=>s>0);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0});
  const readiness=scored.length?Math.round((scored.filter(s=>s>=2).length/ALL.length)*100):0;

  let html='<div class="report-person-header"><div class="rph-avatar" style="background:'+p.color+'">'+cur.slice(0,2).toUpperCase()+'</div><div class="rph-info"><h3>'+cur+'</h3><p>'+p.role+' \u00b7 '+p.fn+' \u00b7 '+p.level+' \u2192 '+p.target+'</p></div><div class="rph-stats"><div class="rph-stat"><div class="rph-stat-val">'+(avg?avg.toFixed(1):"\u2014")+'</div><div class="rph-stat-label">Overall</div></div><div class="rph-stat"><div class="rph-stat-val">'+(skAvg?skAvg.toFixed(1):"\u2014")+'</div><div class="rph-stat-label">Skills</div></div><div class="rph-stat"><div class="rph-stat-val">'+(vlAvg?vlAvg.toFixed(1):"\u2014")+'</div><div class="rph-stat-label">Values</div></div><div class="rph-stat"><div class="rph-stat-val">'+readiness+'%</div><div class="rph-stat-label">Ready</div></div></div></div>';
  html+='<div class="context-box"><h4>Profile & Context</h4><p>'+p.context+'</p></div>';
  html+='<div class="context-box"><h4>Readiness for '+p.target+'</h4><p>'+p.devFocus+'</p><div style="margin-top:8px"><div class="readiness-track"><div class="readiness-fill" style="width:'+readiness+'%;background:'+(readiness>=70?"var(--ovo)":readiness>=40?"var(--yel)":"var(--org)")+'"></div></div><div class="readiness-markers"><span>0% Not ready</span><span>50%</span><span>100% Ready for '+p.target+'</span></div></div></div>';

  if(!scored.length){html+='<div style="padding:40px;text-align:center;color:#999;font-size:14px;background:#fff;border-radius:10px;border:1px solid #eae8e3">No scores entered yet. Score '+cur+' on the Radar & Framework tab to generate insights.</div>';el.innerHTML=html;return}

  html+='<div class="report-grid">';
  if(learning.length){html+='<div class="report-card'+(learning.length>3?" rc-full":"")+'"><h4><span class="icon" style="background:var(--org)">!</span> Priority \u2014 Learning (develop these first)</h4>';
    learning.forEach(x=>{const isS=x.i<6,f=fw[x.dim],fn=fwN?fwN[x.dim]:null,below=teamAvgs[x.i]>0&&1<teamAvgs[x.i];
      html+='<div class="rc-item priority"><div class="rc-item-top"><div class="rc-item-name">'+x.dim+'</div><div class="rc-item-type">'+(isS?"Skill":"Value")+(below?" \u00b7 Below team avg":"")+'</div></div><div class="rc-item-text"><strong>Current (Learning):</strong> '+f.l+'</div><div class="rc-item-text"><strong>To reach Practicing:</strong> '+f.p+'</div>'+(fn?'<div class="rc-item-action"><strong>At '+p.target+' (Practicing):</strong> '+fn.p+'</div>':'')+'</div>'});
    html+='</div>'}
  if(practicing.length){html+='<div class="report-card'+(practicing.length>3?" rc-full":"")+'"><h4><span class="icon" style="background:var(--ovo)">\u2191</span> Building \u2014 Practicing \u2192 Mastering</h4>';
    practicing.forEach(x=>{const isS=x.i<6,f=fw[x.dim],fn=fwN?fwN[x.dim]:null;
      html+='<div class="rc-item building"><div class="rc-item-top"><div class="rc-item-name">'+x.dim+'</div><div class="rc-item-type">'+(isS?"Skill":"Value")+'</div></div><div class="rc-item-text"><strong>Current (Practicing):</strong> '+f.p+'</div><div class="rc-item-text"><strong>To reach Mastering:</strong> '+f.m+'</div>'+(fn?'<div class="rc-item-action"><strong>At '+p.target+' (Practicing):</strong> '+fn.p+'</div>':'')+'</div>'});
    html+='</div>'}
  if(mastering.length){html+='<div class="report-card"><h4><span class="icon" style="background:var(--blu)">\u2605</span> Strengths \u2014 Mastering</h4>';
    mastering.forEach(x=>{const isS=x.i<6,fn=fwN?fwN[x.dim]:null;
      html+='<div class="rc-item strength"><div class="rc-item-top"><div class="rc-item-name">'+x.dim+'</div><div class="rc-item-type">'+(isS?"Skill":"Value")+'</div></div><div class="rc-item-text">Operating at the highest level for '+p.level+'. Strong foundation to build on.</div>'+(fn?'<div class="rc-item-action"><strong>To sustain at '+p.target+':</strong> '+fn.m+'</div>':'')+'</div>'});
    html+='</div>'}
  html+='<div class="report-card"><h4><span class="icon" style="background:#888">\u2261</span> Versus team average</h4>';
  ALL.forEach((dim,i)=>{const s=p.scores[i];if(!s)return;const ta=teamAvgs[i];if(!ta)return;const diff=s-ta;const arrow=diff>0.1?"\u2191 Above":diff<-0.1?"\u2193 Below":"\u2248 At";const col=diff>0.1?"var(--ovo)":diff<-0.1?"var(--org)":"#888";
    html+='<div class="cmp-row"><span style="flex:1;color:var(--mid)">'+dim+'</span><span class="hm-cell hm-'+s+'" style="width:28px;height:22px;font-size:10px">'+s+'</span><span style="width:70px;text-align:center;font-weight:600;color:'+col+';font-size:11px">'+arrow+'</span><span style="width:32px;text-align:right;color:#999;font-size:11px">'+ta.toFixed(1)+'</span></div>'});
  html+='</div></div>';

  html+='<div class="context-box" style="margin-top:16px"><h4>Summary</h4><p><strong>'+cur+'</strong> is currently at <strong>'+p.level+'</strong> with an overall average of <strong>'+(avg?avg.toFixed(1):"\u2014")+'/3.0</strong>. '+
    (learning.length?'There '+(learning.length===1?"is":"are")+' <strong>'+learning.length+' dimension'+(learning.length>1?"s":"")+'</strong> at Learning that need focused development. ':' No dimensions at Learning \u2014 solid baseline. ')+
    (practicing.length?'<strong>'+practicing.length+'</strong> at Practicing \u2014 meeting expectations but with room to grow. ':'')+
    (mastering.length?'<strong>'+mastering.length+'</strong> at Mastering \u2014 clear strengths to leverage. ':'')+
    'Readiness for '+p.target+': <strong>'+readiness+'%</strong> of dimensions at Practicing or above.</p><p style="margin-top:8px"><strong>Manager\'s development focus:</strong> '+p.devFocus+'</p></div>';
  el.innerHTML=html;
}

function hexRgb(hex){return parseInt(hex.slice(1,3),16)+","+parseInt(hex.slice(3,5),16)+","+parseInt(hex.slice(5,7),16)}
buildPills("pills-radar");buildPills("pills-report");drawRadar();buildFW();buildReport();
window.addEventListener("resize",drawRadar);
</script>
</body>
</html>
